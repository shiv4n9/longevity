<!DOCTYPE html>
<html>
<head>
    <title>Longevity Monitoring Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f0;
            color: #333;
            padding: 30px;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #22c55e;
            margin: 0 0 15px 0;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .controls-container {
            width: 95%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: relative;
        }

        .dropdown-container {
            position: relative;
        }

        .dropdown-btn {
            background: #22c55e;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-btn:hover {
            background: #16a34a;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 1;
            margin-top: 5px;
            overflow: hidden;
        }

        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background-color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #f0f0f0;
        }

        .dropdown-content .separator {
            height: 1px;
            background-color: #e0e0e0;
            margin: 5px 0;
        }

        .show {
            display: block;
        }

        .filter-info {
            margin-right: 15px;
            padding: 8px 16px;
            background: #e8f5e9;
            border-radius: 6px;
            color: #2e7d32;
            font-size: 14px;
            font-weight: 500;
        }

        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 95%;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            border: 1px solid #e0e0e0;
            text-align: center;
        }

        th {
            background: #22c55e;
            color: white;
            font-weight: bold;
        }

        td {
            color: #333;
        }

        #status {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            color: #000;
            font-weight: 500;
        }

        .no-data-message {
            text-align: center;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        .no-data-message h2 {
            color: #22c55e;
            margin-bottom: 15px;
        }

        .no-data-message p {
            color: #666;
            font-size: 16px;
        }

        .arrow-down {
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 5px;
            vertical-align: middle;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid white;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>Longevity Monitoring Dashboard</h1>
</div>

<div class="controls-container">
    <div id="filterInfo" class="filter-info" style="display: none;">
        Showing: <span id="filterType">All Devices</span>
    </div>
    <div class="dropdown-container">
        <button class="dropdown-btn" onclick="toggleDropdown()">
            <span id="btnText">Refresh Metrics</span>
            <span class="arrow-down"></span>
        </button>
        <div id="dropdownMenu" class="dropdown-content">
            <a href="#" onclick="refreshData('all'); return false;">Refresh All Devices</a>
            <a href="#" onclick="refreshData('vsrx'); return false;">Refresh vSRX</a>
            <a href="#" onclick="refreshData('highend'); return false;">Refresh High-End</a>
            <a href="#" onclick="refreshData('branch'); return false;">Refresh Branch</a>
            <a href="#" onclick="refreshData('spc3'); return false;">Refresh SPC3</a>
            <div class="separator"></div>
            <a href="#" onclick="fetchLatestData(); return false;">Latest Data (No Execution)</a>
        </div>
    </div>
</div>

<div id="noDataMessage" class="no-data-message" style="display: none;">
    <h2>No Data Available</h2>
    <p>Press the refresh button to collect data from devices</p>
</div>

<table id="dataTable" style="display: none;">
    <thead>
        <tr id="tableHead"></tr>
    </thead>
    <tbody></tbody>
</table>

<p id="status"></p>

<script>
    // Load initial data when page loads
    window.onload = function() {
        loadInitialData();
    };

    function toggleDropdown() {
        document.getElementById("dropdownMenu").classList.toggle("show");
    }

    // Close dropdown if user clicks outside
    window.onclick = function(event) {
        if (!event.target.matches('.dropdown-btn') && !event.target.matches('.dropdown-btn *')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }

    function updateFilterInfo(filterType) {
        const filterInfo = document.getElementById("filterInfo");
        const filterTypeText = document.getElementById("filterType");
        
        const filterNames = {
            'all': 'All Devices',
            'vsrx': 'vSRX Devices Only',
            'highend': 'High-End Devices Only',
            'branch': 'Branch Devices Only',
            'spc3': 'SPC3 Devices Only'
        };
        
        if (filterType && filterType !== 'all') {
            filterTypeText.innerText = filterNames[filterType] || 'All Devices';
            filterInfo.style.display = 'block';
        } else {
            filterInfo.style.display = 'none';
        }
    }

    function loadInitialData() {
        document.getElementById("status").innerText = "Loading data...";
        
        fetch("/initial-data")
            .then(res => res.json())
            .then(response => {
                if (response.status === "no_data") {
                    showNoDataMessage(response.message);
                } else if (response.status === "success") {
                    displayData(response.data);
                    updateFilterInfo(response.filter_type);
                } else {
                    document.getElementById("status").innerText = "Error: " + response.message;
                }
            })
            .catch(err => {
                document.getElementById("status").innerText = "Request failed: " + err;
            });
    }

    function showNoDataMessage(message) {
        document.getElementById("noDataMessage").style.display = "block";
        document.getElementById("dataTable").style.display = "none";
        document.getElementById("filterInfo").style.display = "none";
        document.getElementById("status").innerText = "";
    }

    function hideNoDataMessage() {
        document.getElementById("noDataMessage").style.display = "none";
        document.getElementById("dataTable").style.display = "table";
    }

    function refreshData(deviceType) {
        // Close dropdown
        document.getElementById("dropdownMenu").classList.remove("show");
        
        let deviceTypeName = {
            'all': 'all devices',
            'vsrx': 'vSRX devices',
            'highend': 'High-End devices',
            'branch': 'Branch devices',
            'spc3': 'SPC3 devices'
        }[deviceType] || 'devices';
        
        document.getElementById("status").innerHTML = 
            '<span class="spinner"></span> Running script for ' + deviceTypeName + '...';
        document.getElementById("btnText").innerHTML = '<span class="spinner"></span> Processing...';
    
        fetch("/refresh?type=" + deviceType)
            .then(res => res.json())
            .then(response => {
                document.getElementById("btnText").innerText = "Refresh Metrics";
                
                if (response.status !== "success") {
                    document.getElementById("status").innerText = "Error: " + response.message;
                    return;
                }
    
                displayData(response.data);
                updateFilterInfo(response.filter_type);
            })
            .catch(err => {
                document.getElementById("btnText").innerText = "Refresh Metrics";
                document.getElementById("status").innerText = "Request failed: " + err;
            });
    }

    function fetchLatestData() {
        // Close dropdown
        document.getElementById("dropdownMenu").classList.remove("show");
        
        document.getElementById("status").innerText = "Fetching latest data from Excel...";
        document.getElementById("btnText").innerHTML = '<span class="spinner"></span> Fetching...';
    
        fetch("/latest-data")
            .then(res => res.json())
            .then(response => {
                document.getElementById("btnText").innerText = "Refresh Metrics";
                
                if (response.status === "no_data") {
                    showNoDataMessage(response.message);
                } else if (response.status === "success") {
                    displayData(response.data);
                    updateFilterInfo(response.filter_type);
                } else {
                    document.getElementById("status").innerText = "Error: " + response.message;
                }
            })
            .catch(err => {
                document.getElementById("btnText").innerText = "Refresh Metrics";
                document.getElementById("status").innerText = "Request failed: " + err;
            });
    }

    function displayData(data) {
        hideNoDataMessage();
        
        let tableHead = document.getElementById("tableHead");
        let tableBody = document.querySelector("#dataTable tbody");
    
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";
    
        let security = data.security;
    
        if (!security || security.length === 0) {
            showNoDataMessage("No data available for the selected filter");
            return;
        }
    
        // Define column order
        let columnOrder = [
            "Model",
            "Hostname",
            "Junos",
            "Routing Engine",
            "CPU",
            "Memory",
            "Flow Session Current",
            "CP Session Current",
            "Cores",
            "Global Data SHM(%)",
            "Timestamp"
        ];
    
        // Create table headers in specified order
        columnOrder.forEach(col => {
            if (security[0].hasOwnProperty(col)) {
                let th = document.createElement("th");
                th.innerText = col;
                tableHead.appendChild(th);
            }
        });
    
        // Create table rows dynamically
        security.forEach(row => {
            let tr = document.createElement("tr");
    
            columnOrder.forEach(col => {
                if (row.hasOwnProperty(col)) {
                    let td = document.createElement("td");
                    
                    // Special handling for Cores column
                    if (col === "Cores" && row[col] === "Yes") {
                        let link = document.createElement("a");
                        link.href = "#";
                        link.innerText = "Yes";
                        link.style.color = "#22c55e";
                        link.style.fontWeight = "bold";
                        link.style.textDecoration = "underline";
                        link.onclick = function(e) {
                            e.preventDefault();
                            showCoreOutput(row["Hostname"]);
                        };
                        td.appendChild(link);
                    } else {
                        td.innerText = row[col];
                    }
                    
                    tr.appendChild(td);
                }
            });
    
            tableBody.appendChild(tr);
        });
    
        document.getElementById("status").innerText = "Last updated: " + data.timestamp;
    }
    
    function showCoreOutput(hostname) {
        // Fetch core dumps output for the specific hostname
        fetch("/core-dumps/" + hostname)
            .then(res => res.json())
            .then(response => {
                if (response.status === "success") {
                    // Create a modal/popup to display the output
                    let modal = document.createElement("div");
                    modal.style.position = "fixed";
                    modal.style.top = "0";
                    modal.style.left = "0";
                    modal.style.width = "100%";
                    modal.style.height = "100%";
                    modal.style.backgroundColor = "rgba(0,0,0,0.7)";
                    modal.style.zIndex = "1000";
                    modal.style.display = "flex";
                    modal.style.justifyContent = "center";
                    modal.style.alignItems = "center";
                    
                    let content = document.createElement("div");
                    content.style.backgroundColor = "#fff";
                    content.style.padding = "30px";
                    content.style.borderRadius = "10px";
                    content.style.maxWidth = "80%";
                    content.style.maxHeight = "80%";
                    content.style.overflow = "auto";
                    content.style.boxShadow = "0 4px 20px rgba(0,0,0,0.3)";
                    
                    let title = document.createElement("h2");
                    title.innerText = "Core Dumps Output - " + hostname;
                    title.style.color = "#22c55e";
                    title.style.marginBottom = "20px";
                    
                    let pre = document.createElement("pre");
                    pre.innerText = response.output;
                    pre.style.backgroundColor = "#f5f5f0";
                    pre.style.padding = "15px";
                    pre.style.borderRadius = "5px";
                    pre.style.overflow = "auto";
                    pre.style.fontSize = "14px";
                    pre.style.whiteSpace = "pre-wrap";
                    
                    let closeBtn = document.createElement("button");
                    closeBtn.innerText = "Close";
                    closeBtn.style.marginTop = "20px";
                    closeBtn.style.padding = "10px 20px";
                    closeBtn.style.backgroundColor = "#22c55e";
                    closeBtn.style.color = "white";
                    closeBtn.style.border = "none";
                    closeBtn.style.borderRadius = "5px";
                    closeBtn.style.cursor = "pointer";
                    closeBtn.onclick = function() {
                        document.body.removeChild(modal);
                    };
                    
                    content.appendChild(title);
                    content.appendChild(pre);
                    content.appendChild(closeBtn);
                    modal.appendChild(content);
                    
                    // Close on background click
                    modal.onclick = function(e) {
                        if (e.target === modal) {
                            document.body.removeChild(modal);
                        }
                    };
                    
                    document.body.appendChild(modal);
                } else {
                    alert("Failed to fetch core dumps output: " + response.message);
                }
            })
            .catch(err => {
                alert("Error fetching core dumps: " + err);
            });
    }
</script>

</body>
</html>
